<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>생산2팀 생산성 현황</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f4f7f9; color: #2c3e50; }
        h1 { text-align: center; color: #34495e; margin-bottom: 30px; font-size: 1.8rem; }
        .dashboard-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; height: 650px; }
        .column { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #e0e6ed; }
        .column-header { background: #2c3e50; color: white; padding: 15px; font-weight: bold; text-align: center; font-size: 1rem; }
        .list-container { flex: 1; overflow-y: auto; padding: 10px; background: #fff; }
        .item { padding: 12px; margin-bottom: 8px; background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; line-height: 1.4; }
        .item:hover { background: #ebf5fb; border-color: #3498db; transform: translateX(5px); }
        .item.active { background: #3498db; color: white; border-color: #2980b9; font-weight: bold; }
        .result-box { padding: 20px; border-radius: 10px; background: #f8f9fa; border: 1px solid #dee2e6; text-align: center; }
        .yield-label { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 10px; }
        .yield-val { font-size: 2.2rem; font-weight: bold; color: #2980b9; margin: 15px 0; }
        .weight-info { font-size: 0.85rem; color: #34495e; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 5px; line-height: 1.6; text-align: left; }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; }
        .status-normal { background: #2ecc71; color: white; }
        .status-alert { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <h1>[생산2팀 생산성 현황]</h1>

    <div class="dashboard-container">
        <div class="column"><div class="column-header">1. 제품 List</div><div id="productList" class="list-container"></div></div>
        <div class="column"><div class="column-header">2. 배치번호</div><div id="batchList" class="list-container"></div></div>
        <div class="column"><div class="column-header">3. 공정</div><div id="processList" class="list-container"></div></div>
        <div class="column"><div class="column-header">4. 수율</div><div id="yieldResult" class="list-container"></div></div>
    </div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJoIbArdj4_BDnV6wxNgLd3k55kbagI1rIdqqBBW5WMb63lHFh3K-UWoPpBwbUeRXjt9B5ieNXa05/pub?gid=240982560&single=true&output=csv';
    let rawData = [];
    const PROC_ORDER = ["과립", "타정", "코팅", "선별", "인쇄"];
    
    // 이론량 추적을 위한 장비 리스트 정의
    const THEO_MACHINES = {
        "타정": ["KIK1", "KIK2", "KIK3", "KIK4", "KORSCH"],
        "코팅": ["금성80", "금성130", "금성-170", "세종-130"],
        "선별": ["자동", "수동"]
    };

    function init() {
        Papa.parse(CSV_URL, {
            download: true, header: false,
            complete: (results) => { rawData = results.data.slice(1); renderProducts(); }
        });
    }

    function renderProducts() {
        const productSet = new Set();
        rawData.forEach(row => { if(row[2]) productSet.add(row[2]); });
        const container = document.getElementById('productList');
        container.innerHTML = "";
        Array.from(productSet).sort().forEach(prod => {
            const div = document.createElement('div');
            div.className = 'item'; div.innerText = prod;
            div.onclick = () => selectProduct(prod, div);
            container.appendChild(div);
        });
    }

    function selectProduct(prodName, element) {
        setActive('productList', element);
        const batchSet = new Set();
        rawData.forEach(row => { if(row[2] === prodName && row[4]) batchSet.add(row[4]); });
        const container = document.getElementById('batchList');
        container.innerHTML = ""; document.getElementById('processList').innerHTML = ""; document.getElementById('yieldResult').innerHTML = "";
        Array.from(batchSet).sort().forEach(batch => {
            const div = document.createElement('div');
            div.className = 'item'; div.innerText = batch;
            div.onclick = () => selectBatch(prodName, batch, div);
            container.appendChild(div);
        });
    }

    function selectBatch(prodName, batchId, element) {
        setActive('batchList', element);
        const processes = [];
        rawData.forEach(row => {
            if(row[4] === batchId && row[5]) { 
                const proc = PROC_ORDER.find(p => row[5].includes(p));
                if(proc) {
                    if(proc === "인쇄" && !prodName.includes("레바핀")) return;
                    processes.push({ name: proc, weight: parseFloat(row[6]), detail: row[5], status: row[10] });
                }
            }
        });
        const container = document.getElementById('processList');
        container.innerHTML = ""; document.getElementById('yieldResult').innerHTML = "";
        const uniqueProcs = [...new Map(processes.map(item => [item.name, item])).values()].sort((a, b) => PROC_ORDER.indexOf(a.name) - PROC_ORDER.indexOf(b.name));
        uniqueProcs.forEach(p => {
            const div = document.createElement('div');
            div.className = 'item'; div.innerText = p.name;
            div.onclick = () => calculateYield(batchId, p.name, div);
            container.appendChild(div);
        });
    }

    function calculateYield(batchId, selectedProc, element) {
        setActive('processList', element);
        const container = document.getElementById('yieldResult');
        container.innerHTML = "";
        if(selectedProc === "과립") { container.innerHTML = `<div style="padding:20px; color:#888; text-align:center;">과립 공정은 수율 계산에서 제외됩니다.</div>`; return; }

        const steps = rawData.filter(row => row[4] === batchId).map(row => ({
            proc: PROC_ORDER.find(p => row[5].includes(p)),
            detail: row[5], weight: parseFloat(row[6]), status: (row[10] || "").toUpperCase()
        })).filter(s => s.proc && !isNaN(s.weight));

        let theoryStep, actualStep = steps.find(s => s.proc === selectedProc);
        let theoryName = "";

        if (selectedProc === "타정") {
            theoryStep = steps.find(s => s.detail.includes("과립-Blender"));
            theoryName = "과립-Blender";
        } else if (selectedProc === "코팅") {
            theoryStep = steps.find(s => THEO_MACHINES["타정"].some(m => s.detail.includes(m)));
            theoryName = "타정 공정 (KIK/KORSCH)";
        } else if (selectedProc === "선별") {
            theoryStep = steps.find(s => THEO_MACHINES["코팅"].some(m => s.detail.includes(m))) || 
                         steps.find(s => THEO_MACHINES["타정"].some(m => s.detail.includes(m)));
            theoryName = theoryStep ? (theoryStep.proc === "코팅" ? "코팅 공정" : "타정 공정") : "상위 공정";
        } else if (selectedProc === "인쇄") {
            theoryStep = steps.find(s => THEO_MACHINES["선별"].some(m => s.detail.includes(m)));
            theoryName = "선별 공정 (자동/수동)";
        }

        if(actualStep && theoryStep) {
            const yieldVal = ((actualStep.weight / theoryStep.weight) * 100).toFixed(1);
            container.innerHTML = `
                <div class="result-box">
                    <div class="yield-label">${selectedProc} 수율 분석</div>
                    <div class="weight-info">
                        • 이론량(${theoryName}): <b>${theoryStep.weight.toLocaleString()} Kg</b><br>
                        • 실생산량(${actualStep.detail}): <b>${actualStep.weight.toLocaleString()} Kg</b>
                    </div>
                    <div class="yield-val">${yieldVal}%</div>
                    <span class="status-badge ${actualStep.status.includes("PCNF") ? 'status-alert' : 'status-normal'}">
                        ${actualStep.status.includes("PCNF") ? '⚠️ PCNF 발생' : '✅ 정상(CNF)'}
                    </span>
                </div>`;
        } else {
            container.innerHTML = `<div style="padding:20px; color:#e74c3c; text-align:center;">이론량 기준 데이터(${theoryName || "직전 공정"})를 찾을 수 없습니다.</div>`;
        }
    }

    function setActive(containerId, element) {
        document.querySelectorAll(`#${containerId} .item`).forEach(i => i.classList.remove('active'));
        element.classList.add('active');
    }
    init();
</script>
</body>
</html>
