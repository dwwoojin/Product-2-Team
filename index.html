<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>생산2팀 생산성 현황</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f4f7f9; color: #2c3e50; }
        h1 { text-align: center; color: #34495e; margin-bottom: 30px; font-size: 1.8rem; }
        
        .dashboard-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; height: 650px; }
        .column { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #e0e6ed; }
        .column-header { background: #34495e; color: white; padding: 15px; font-weight: bold; text-align: center; font-size: 1rem; }
        .list-container { flex: 1; overflow-y: auto; padding: 10px; background: #fff; }
        
        .item { padding: 12px; margin-bottom: 8px; background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; line-height: 1.4; }
        .item:hover { background: #ebf5fb; border-color: #3498db; transform: translateX(5px); }
        .item.active { background: #3498db; color: white; border-color: #2980b9; font-weight: bold; }

        .result-box { padding: 20px; border-radius: 10px; background: #f8f9fa; border: 1px solid #dee2e6; text-align: center; }
        .yield-label { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 10px; }
        .yield-val { font-size: 2.2rem; font-weight: bold; color: #2980b9; margin: 15px 0; }
        .weight-info { font-size: 0.9rem; color: #34495e; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 5px; }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; }
        .status-normal { background: #2ecc71; color: white; }
        .status-alert { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <h1>[생산2팀 생산성 현황]</h1>

    <div class="dashboard-container">
        <div class="column">
            <div class="column-header">1. 제품 List</div>
            <div id="productList" class="list-container"></div>
        </div>

        <div class="column">
            <div class="column-header">2. 오더번호</div>
            <div id="orderList" class="list-container"></div>
        </div>

        <div class="column">
            <div class="column-header">3. 공정</div>
            <div id="processList" class="list-container"></div>
        </div>

        <div class="column">
            <div class="column-header">4. 수율</div>
            <div id="yieldResult" class="list-container"></div>
        </div>
    </div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJoIbArdj4_BDnV6wxNgLd3k55kbagI1rIdqqBBW5WMb63lHFh3K-UWoPpBwbUeRXjt9B5ieNXa05/pub?gid=240982560&single=true&output=csv';
    
    let rawData = [];
    const PROC_ORDER = ["과립", "타정", "코팅", "선별", "인쇄"];

    function init() {
        Papa.parse(CSV_URL, {
            download: true,
            header: false,
            complete: (results) => {
                rawData = results.data.slice(1); // 첫 줄(헤더) 제외
                renderProducts();
            }
        });
    }

    // 1단계: C열(인덱스 2) 자재내역 리스트 출력
    function renderProducts() {
        const productSet = new Set();
        rawData.forEach(row => { if(row[2]) productSet.add(row[2]); });
        
        const container = document.getElementById('productList');
        container.innerHTML = "";
        Array.from(productSet).sort().forEach(prod => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = prod;
            div.onclick = () => selectProduct(prod, div);
            container.appendChild(div);
        });
    }

    // 2단계: 제품 선택 -> 해당 제품의 D열(인덱스 3) 오더번호 리스트 출력
    function selectProduct(prodName, element) {
        setActive('productList', element);
        const orderSet = new Set();
        rawData.forEach(row => {
            if(row[2] === prodName && row[3]) orderSet.add(row[3]);
        });

        const container = document.getElementById('orderList');
        container.innerHTML = "";
        document.getElementById('processList').innerHTML = "";
        document.getElementById('yieldResult').innerHTML = "";

        Array.from(orderSet).sort().forEach(order => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = order;
            div.onclick = () => selectOrder(order, div);
            container.appendChild(div);
        });
    }

    // 3단계: 오더번호 선택 -> 공정 리스트 출력
    function selectOrder(orderId, element) {
        setActive('orderList', element);
        const processes = [];
        rawData.forEach(row => {
            if(row[3] === orderId && row[5]) { // D열 오더번호와 매칭되는 행의 F열 작업내역 확인
                const proc = PROC_ORDER.find(p => row[5].includes(p));
                if(proc) processes.push({ name: proc, weight: parseFloat(row[8]), status: row[10] });
            }
        });

        const container = document.getElementById('processList');
        container.innerHTML = "";
        document.getElementById('yieldResult').innerHTML = "";

        // 중복 공정 제거 및 정렬
        const uniqueProcs = [...new Map(processes.map(item => [item.name, item])).values()]
                            .sort((a, b) => PROC_ORDER.indexOf(a.name) - PROC_ORDER.indexOf(b.name));

        uniqueProcs.forEach(p => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = p.name;
            div.onclick = () => calculateYield(orderId, p.name, div);
            container.appendChild(div);
        });
    }

    // 4단계: 공정 선택 -> 수율 계산 (I열 확정수율 활용)
    function calculateYield(orderId, selectedProc, element) {
        setActive('processList', element);
        
        const currentOrderRows = rawData.filter(row => row[3] === orderId);
        const steps = currentOrderRows.map(row => ({
            proc: PROC_ORDER.find(p => row[5].includes(p)),
            weight: parseFloat(row[8]), // I열(인덱스 8) 확정수율
            status: (row[10] || "").toUpperCase() // K열(인덱스 10) 상태
        })).filter(s => s.proc && !isNaN(s.weight))
           .sort((a, b) => PROC_ORDER.indexOf(a.proc) - PROC_ORDER.indexOf(b.proc));

        const targetIdx = steps.findIndex(s => s.proc === selectedProc);
        const container = document.getElementById('yieldResult');
        container.innerHTML = "";

        if(targetIdx > 0) {
            const upper = steps[targetIdx - 1];
            const lower = steps[targetIdx];
            const yieldVal = ((lower.weight / upper.weight) * 100).toFixed(1);
            const isPCNF = lower.status.includes("PCNF");

            container.innerHTML = `
                <div class="result-box">
                    <div class="yield-label">선택 구간 수율</div>
                    <div class="weight-info">
                        ${upper.proc}: <b>${upper.weight.toLocaleString()} Kg</b><br>
                        ↓<br>
                        ${lower.proc}: <b>${lower.weight.toLocaleString()} Kg</b>
                    </div>
                    <div class="yield-val">${yieldVal}%</div>
                    <span class="status-badge ${isPCNF ? 'status-alert' : 'status-normal'}">
                        ${isPCNF ? '⚠️ PCNF 발생' : '✅ 정상(CNF)'}
                    </span>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div style="padding:20px; color:#888; text-align:center; font-size:0.9rem;">
                    첫 번째 공정이거나<br>상위 공정 데이터가 없어<br>수율을 계산할 수 없습니다.
                </div>`;
        }
    }

    function setActive(containerId, element) {
        document.querySelectorAll(`#${containerId} .item`).forEach(i => i.classList.remove('active'));
        element.classList.add('active');
    }

    init();
</script>
</body>
</html>
