<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>[생산2팀 생산성 현황 및 시스템 상태]</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f4f7f9; color: #333; }
        .status-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .status-card { flex: 1; padding: 20px; border-radius: 12px; text-align: center; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-normal { background-color: #2ecc71; color: white; }
        .status-alert { background-color: #e74c3c; color: white; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: center; border: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .highlight { color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

    <h1>[생산2팀 생산성 및 시스템 상태]</h1>

    <div class="status-container">
        <div id="system-status" class="status-card status-normal">
            데이터 분석 중...
        </div>
        <div id="pcnf-count" class="status-card" style="background-color: #fff; color: #333;">
            PCNF 탐지: 0건
        </div>
    </div>

    <div class="card">
        <h2>장비별 가동 점유율</h2>
        <canvas id="machineChart" style="max-height: 250px;"></canvas>
    </div>

    <div class="card">
        <h2>공정 수율 현황 (오더번호 기준)</h2>
        <table id="yieldTable">
            <thead>
                <tr>
                    <th>제품명</th>
                    <th>오더번호</th>
                    <th>최종 공정</th>
                    <th>최종 수율</th>
                    <th>상태</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJoIbArdj4_BDnV6wxNgLd3k55kbagI1rIdqqBBW5WMb63lHFh3K-UWoPpBwbUeRXjt9B5ieNXa05/pub?gid=240982560&single=true&output=csv';
    const PROCESS_ORDER = ["과립", "타정", "코팅", "선별", "인쇄"];

    function init() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: (results) => processData(results.data)
        });
    }

    function processData(data) {
        const machineCounts = {};
        const orderGroups = {};
        let pcnfTotal = 0;

        const keys = Object.keys(data[0]);
        const col = {
            order: keys.find(k => k.includes("오더")),
            product: keys.find(k => k.includes("제품")),
            process: keys.find(k => k.includes("공정")),
            weight: keys.find(k => k.includes("중량") || k.includes("무게")),
            task: keys.find(k => k.includes("작업")),
            status: keys.find(k => k.includes("상태") || k.includes("시스템"))
        };

        data.forEach(row => {
            // 1. 장비 추출
            const mMatch = (row[col.task] || "").match(/([가-힣\w]+(기|라인|장비|호기))/);
            if(mMatch) machineCounts[mMatch[0]] = (machineCounts[mMatch[0]] || 0) + 1;

            // 2. PCNF 판별 (시스템 상태 체크)
            const statusValue = (row[col.status] || "").toUpperCase();
            if(statusValue.includes("PCNF")) pcnfTotal++;

            // 3. 오더별 그룹화
            const orderId = row[col.order];
            if(!orderId) return;
