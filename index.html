<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>[생산2팀 생산성 현황]</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: center; border: 1px solid #ddd; }
        th { background-color: #f8f9fa; font-weight: bold; }
        .yield-text { font-weight: bold; color: #2980b9; }
        .alert-text { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <h1>[생산2팀 생산성 현황]</h1>

    <div class="card">
        <h2>오더번호별 상세 공정 수율 (I열 확정수율 기준)</h2>
        <table id="yieldTable">
            <thead>
                <tr>
                    <th>제품명</th>
                    <th>오더번호</th>
                    <th>공정 단계 (상위 → 하위)</th>
                    <th>공정 수율 (%)</th>
                    <th>상태</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJoIbArdj4_BDnV6wxNgLd3k55kbagI1rIdqqBBW5WMb63lHFh3K-UWoPpBwbUeRXjt9B5ieNXa05/pub?gid=240982560&single=true&output=csv';
    
    // 공정 순서 정의
    const PROCESS_ORDER = ["과립", "타정", "코팅", "선별", "인쇄"];

    function init() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: (results) => processData(results.data)
        });
    }

    function processData(data) {
        const orderGroups = {};

        data.forEach(row => {
            const orderId = row["오더번호"] || row["오더"];
            if(!orderId) return;

            if(!orderGroups[orderId]) {
                orderGroups[orderId] = { 
                    name: row["제품명"] || row["제품"], 
                    steps: [],
                    hasPCNF: (row["시스템상태"] || row["상태"] || "").toUpperCase().includes("PCNF")
                };
            }

            // I열(확정수율) 데이터를 숫자로 변환
            const confirmedWeight = parseFloat(row["확정수율"] || row["확정 수율"]);
            const processName = row["공정"] || "";

            if(!isNaN(confirmedWeight)) {
                orderGroups[orderId].steps.push({
                    process: processName,
                    weight: confirmedWeight
                });
            }
            
            // 공정 중 PCNF가 하나라도 있으면 표시
            if((row["시스템상태"] || row["상태"] || "").toUpperCase().includes("PCNF")) {
                orderGroups[orderId].hasPCNF = true;
            }
        });

        renderTable(orderGroups);
    }

    function renderTable(groups) {
        const tbody = document.querySelector("#yieldTable tbody");
        tbody.innerHTML = "";

        for(let id in groups) {
            const g = groups[id];
            // 설정된 순서대로 공정 정렬
            g.steps.sort((a, b) => PROCESS_ORDER.indexOf(a.process) - PROCESS_ORDER.indexOf(b.process));

            if(g.steps.length >= 2) {
                // 상위 공정과 하위 공정을 순차적으로 비교
                for(let i = 1; i < g.steps.length; i++) {
                    const upper = g.steps[i-1]; // 상위 공정
                    const lower = g.steps[i];   // 하위 공정
                    
                    const stepYield = ((lower.weight / upper.weight) * 100).toFixed(2);
                    const statusHtml = g.hasPCNF ? `<span class="alert-text">PCNF</span>` : `정상`;

                    tbody.innerHTML += `
                        <tr>
                            <td>${g.name}</td>
                            <td>${id}</td>
                            <td>${upper.process} → ${lower.process}</td>
                            <td class="yield-text">${stepYield}%</td>
                            <td>${statusHtml}</td>
                        </tr>`;
                }
            } else {
                // 데이터가 하나뿐이라 비교가 불가능한 경우
                const currentProcess = g.steps.length > 0 ? g.steps[0].process : "미확인";
                tbody.innerHTML += `
                    <tr>
                        <td>${g.name}</td>
                        <td>${id}</td>
                        <td>${currentProcess} (상위 공정 데이터 필요)</td>
                        <td>-</td>
                        <td>${g.hasPCNF ? "PCNF" : "정상"}</td>
                    </tr>`;
            }
        }
    }

    init();
</script>
</body>
</html>
