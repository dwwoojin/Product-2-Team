<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>생산2팀 배치별 생산성 현황</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f4f7f9; color: #2c3e50; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .box { flex: 1; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .alert-active { border: 2px solid #e74c3c; color: #e74c3c; background: #fff5f5; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { font-size: 1.1rem; border-left: 5px solid #3498db; padding-left: 12px; margin-bottom: 15px; }
        
        .filter-container { background: #ebf2f7; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .filter-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #64748b; }
        .filter-input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; color: #7f8c8d; position: sticky; top: 0; }
        .yield-badge { font-weight: bold; color: #2980b9; background: #eef7ff; padding: 5px 10px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>[생산2팀 배치별 생산성 현황]</h1>
        <div id="update-time" style="font-size: 0.8rem; color: #95a5a6;"></div>
    </div>

    <div class="status-container">
        <div id="sys-status" class="box" style="border: 2px solid #2ecc71; color: #2ecc71;">시스템 상태: 정상 (CNF)</div>
        <div id="pcnf-summary" class="box">PCNF 탐지: 0건</div>
    </div>

    <div class="card">
        <h2>공정 수율 분석 및 필터</h2>
        
        <div class="filter-container">
            <div class="filter-row">
                <div class="filter-group">
                    <label>제품명 검색 (D열)</label>
                    <input type="text" id="filterProduct" class="filter-input" placeholder="제품명 입력..." onkeyup="filterTable()">
                </div>
                <div class="filter-group">
                    <label>배치번호 검색 (E열)</label>
                    <input type="text" id="filterBatch" class="filter-input" placeholder="배치번호 입력..." onkeyup="filterTable()">
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label>공정 분류</label>
                    <select id="mainCategory" onchange="updateSubCategory()">
                        <option value="">전체 공정</option>
                        <option value="과립">과립</option>
                        <option value="타정">타정</option>
                        <option value="코팅">코팅</option>
                        <option value="선별">선별</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>세부 장비</label>
                    <select id="subCategory" onchange="filterTable()">
                        <option value="">공정을 먼저 선택하세요</option>
                    </select>
                </div>
            </div>
        </div>

        <table id="yieldTable">
            <thead>
                <tr>
                    <th>제품명</th>
                    <th>배치번호</th>
                    <th>공정분류</th>
                    <th>세부장비</th>
                    <th>이론량</th>
                    <th>생산량</th>
                    <th>수율 (%)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
