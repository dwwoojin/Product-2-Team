<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>생산2팀 배치별 생산성 현황</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f4f7f9; color: #2c3e50; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .box { flex: 1; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .alert-active { border: 2px solid #e74c3c; color: #e74c3c; background: #fff5f5; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { font-size: 1.1rem; border-left: 5px solid #3498db; padding-left: 12px; margin-bottom: 15px; }
        
        .filter-container { background: #ebf2f7; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .filter-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #64748b; }
        .filter-input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; color: #7f8c8d; position: sticky; top: 0; }
        .yield-badge { font-weight: bold; color: #2980b9; background: #eef7ff; padding: 5px 10px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>[생산2팀 배치별 생산성 현황]</h1>
        <div id="update-time" style="font-size: 0.8rem; color: #95a5a6;"></div>
    </div>

    <div class="status-container">
        <div id="sys-status" class="box" style="border: 2px solid #2ecc71; color: #2ecc71;">시스템 상태: 정상 (CNF)</div>
        <div id="pcnf-summary" class="box">PCNF 탐지: 0건</div>
    </div>

    <div class="card">
        <h2>공정 수율 분석 및 필터</h2>
        
        <div class="filter-container">
            <div class="filter-row">
                <div class="filter-group">
                    <label>제품명 검색 (D열)</label>
                    <input type="text" id="filterProduct" class="filter-input" placeholder="제품명 입력..." onkeyup="filterTable()">
                </div>
                <div class="filter-group">
                    <label>배치번호 검색 (E열)</label>
                    <input type="text" id="filterBatch" class="filter-input" placeholder="배치번호 입력..." onkeyup="filterTable()">
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label>공정 분류</label>
                    <select id="mainCategory" onchange="updateSubCategory()">
                        <option value="">전체 공정</option>
                        <option value="과립">과립</option>
                        <option value="타정">타정</option>
                        <option value="코팅">코팅</option>
                        <option value="선별">선별</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>세부 장비</label>
                    <select id="subCategory" onchange="filterTable()">
                        <option value="">공정을 먼저 선택하세요</option>
                    </select>
                </div>
            </div>
        </div>

        <table id="yieldTable">
            <thead>
                <tr>
                    <th>제품명</th>
                    <th>배치번호</th>
                    <th>공정분류</th>
                    <th>세부장비</th>
                    <th>이론량</th>
                    <th>실생산량</th>
                    <th>수율 (%)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJoIbArdj4_BDnV6wxNgLd3k55kbagI1rIdqqBBW5WMb63lHFh3K-UWoPpBwbUeRXjt9B5ieNXa05/pub?gid=240982560&single=true&output=csv';

    // 장비 매핑 정보
    const MACHINE_DIC = {
        "과립": ["OP600", "OP300", "OP75", "FBD600", "Blender", "HSM200", "HSM30"],
        "타정": ["KIK1", "KIK2", "KIK3", "KIK4", "KORSCH"],
        "코팅": ["금성80", "금성130", "금성-170-1", "금성-170-2", "세종-130"],
        "선별": ["자동", "수동"]
    };

    function init() {
        Papa.parse(CSV_URL, {
            download: true,
            header: false,
            complete: (results) => {
                processData(results.data.slice(1));
                document.getElementById('update-time').innerText = "최종 업데이트: " + new Date().toLocaleString();
            }
        });
    }

    function updateSubCategory() {
        const mainCat = document.getElementById("mainCategory").value;
        const subSelect = document.getElementById("subCategory");
        subSelect.innerHTML = '<option value="">전체 장비</option>';

        if (mainCat && MACHINE_DIC[mainCat]) {
            MACHINE_DIC[mainCat].forEach(m => {
                const opt = document.createElement("option");
                opt.value = m;
                opt.innerText = m;
                subSelect.appendChild(opt);
            });
        }
        filterTable();
    }

    function getMachineInfo(task) {
        for (let cat in MACHINE_DIC) {
            for (let mName of MACHINE_DIC[cat]) {
                if (task.includes(mName)) {
                    return { cat: cat, detail: mName };
                }
            }
        }
        return { cat: "기타", detail: "미분류" };
    }

    function processData(data) {
        const batchGroups = {};
        const pcnfs = [];

        data.forEach(row => {
            const product = row[3] || "미확인"; // D열 제품명
            const batch = row[4] || "No Data";   // E열 배치번호
            const hVal = parseFloat(row[7]);     // H열 수치
            const task = row[5] || "";           // 작업내역
            const status = (row[10] || "").toUpperCase();

            if (!batch || batch === "No Data") return;

            if (status.includes("PCNF")) pcnfs.push({ id: batch, mat: product, task: task });

            if (!batchGroups[batch]) {
                const info = getMachineInfo(task);
                batchGroups[batch] = { mat: product, cat: info.cat, detail: info.detail, hVals: [] };
            }
            if (!isNaN(hVal)) batchGroups[batch].hVals.push(hVal);
        });

        renderUI(pcnfs, batchGroups);
    }

    function renderUI(pcnfs, batches) {
        const sysBox = document.getElementById('sys-status');
        const sumBox = document.getElementById('pcnf-summary');

        if (pcnfs.length > 0) {
            sysBox.innerText = "시스템 상태: PCNF 이상 탐지";
            sysBox.className = "box alert-active";
            sumBox.innerText = `PCNF 탐지: ${pcnfs.length}건`;
        }

        const yieldTbody = document.querySelector("#yieldTable tbody");
        yieldTbody.innerHTML = "";

        for (let id in batches) {
            const b = batches[id];
            if (b.hVals.length >= 2) {
                const theory = b.hVals[0];
                const actual = b.hVals[b.hVals.length - 1];
                const yieldPct = ((actual / theory) * 100).toFixed(1);

                yieldTbody.innerHTML += `
                    <tr>
                        <td>${b.mat}</td>
                        <td>${id}</td>
                        <td>${b.cat}</td>
                        <td>${b.detail}</td>
                        <td>${theory.toLocaleString()}</td>
                        <td>${actual.toLocaleString()}</td>
                        <td><span class="yield-badge">${yieldPct}%</span></td>
                    </tr>`;
            }
        }
    }

    function filterTable() {
        const prodVal = document.getElementById("filterProduct").value.toUpperCase();
        const batchVal = document.getElementById("filterBatch").value.toUpperCase();
        const mainVal = document.getElementById("mainCategory").value;
        const subVal = document.getElementById("subCategory").value;
        
        const tr = document.getElementById("yieldTable").getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            const rowProd = tr[i].cells[0].innerText.toUpperCase();
            const rowBatch = tr[i].cells[1].innerText.toUpperCase();
            const rowMain = tr[i].cells[2].innerText;
            const rowSub = tr[i].cells[3].innerText;

            const matchProd = rowProd.indexOf(prodVal) > -1;
            const matchBatch = rowBatch.indexOf(batchVal) > -1;
            const matchMain = mainVal === "" || rowMain === mainVal;
            const matchSub = subVal === "" || rowSub === subVal;

            tr[i].style.display = (matchProd && matchBatch && matchMain && matchSub) ? "" : "none";
        }
    }

    init();
</script>
</body>
</html>
